name: Build Zellij ARMv7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-gnueabihf

      - name: Setup Cross-compilation Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Setup Cross
        run: cargo install cross --git https://github.com

      - name: Configure Cargo for Cross
        # 🔗 核心修复：直接在项目根目录强制建立 Cargo 配置文件，确保 Docker 容器内也强制使用本地 Git 客户端
        run: |
          mkdir -p .cargo
          echo '[net]' > .cargo/config.toml
          echo 'git-fetch-with-cli = true' >> .cargo/config.toml

      - name: Build for ARMv7
        # 🌐 核心修复：通过 CROSS_CONTAINER_OPTS 将宿主机的 Git 凭证和特殊环境变量强制透传进编译容器
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          CROSS_CONTAINER_OPTS: "--env CARGO_NET_GIT_FETCH_WITH_CLI=true"
        run: |
          cross build --release --target armv7-unknown-linux-gnueabihf

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zellij-armv7
          path: target/armv7-unknown-linux-gnueabihf/release/zellij
